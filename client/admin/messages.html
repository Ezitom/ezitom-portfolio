<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Messages — dev.folio Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="../../assets/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="admin-layout">
  <main class="main" id="mainContent">
    <div class="page-header">
      <h1 class="page-title">Messages</h1>
      <div class="page-actions">
        <button class="btn btn-ghost btn-sm" id="markAllReadBtn">
          <i class="fas fa-check-double"></i> Mark all read
        </button>
        <button class="btn btn-danger btn-sm" id="clearAllBtn" style="display:none;">
          <i class="fas fa-trash"></i> Clear all
        </button>
      </div>
    </div>

    <div id="messagesContainer">
      <!-- populated by JS -->
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/toast.js"></script>
<script src="js/sidebar.js"></script>
<script>
  if (!requireAuth()) throw new Error('Unauthenticated');
  seedDataIfEmpty();
  renderSidebar('messages');

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  function timeAgo(ts) {
    const diff = (Date.now() - ts) / 1000;
    if (diff < 60)   return 'Just now';
    if (diff < 3600) return `${Math.floor(diff/60)}m ago`;
    if (diff < 86400) return `${Math.floor(diff/3600)}h ago`;
    return new Date(ts).toLocaleDateString('en-GB', { day:'numeric', month:'short', year:'numeric' });
  }

  function renderMessages() {
    const messages = getMessages().slice().reverse(); // newest first
    const container = document.getElementById('messagesContainer');
    const clearBtn  = document.getElementById('clearAllBtn');

    if (!messages.length) {
      clearBtn.style.display = 'none';
      container.innerHTML = `
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <h3>No messages yet</h3>
          <p>When visitors submit your contact form, their messages will appear here.</p>
        </div>`;
      return;
    }

    clearBtn.style.display = 'inline-flex';

    container.innerHTML = messages.map(m => `
      <div class="message-card ${m.read ? '' : 'unread'}" id="msg-${m.id}">
        <div class="message-meta">
          ${!m.read ? '<span class="unread-dot"></span>' : ''}
          <span class="message-name">${escHtml(m.name)}</span>
          <span class="message-email">
            <a href="mailto:${escHtml(m.email)}" style="color:var(--primary);">${escHtml(m.email)}</a>
          </span>
          ${m.subject ? `<span class="tag">${escHtml(m.subject)}</span>` : ''}
          ${m.delivery_status === 'success' 
            ? `<span class="tag green" style="font-size:0.72rem; display:inline-flex; align-items:center; gap:4px;"><i class="fas fa-check-circle"></i> Sent</span>` 
            : m.delivery_status === 'failed' 
            ? `<span class="tag red" style="font-size:0.72rem; display:inline-flex; align-items:center; gap:4px;"><i class="fas fa-exclamation-circle"></i> Delivery Failed</span>` 
            : m.delivery_status === 'pending'
            ? `<span class="tag yellow" style="font-size:0.72rem; display:inline-flex; align-items:center; gap:4px;"><i class="fas fa-clock"></i> Pending</span>`
            : ''
          }
          <span class="message-time">${timeAgo(m.timestamp)}</span>
        </div>
        <div class="message-body">${escHtml(m.message)}</div>
        <div class="message-actions">
          ${!m.read ? `<button class="btn btn-ghost btn-sm" onclick="markRead(${m.id})"><i class="fas fa-check"></i> Mark read</button>` : `<span class="tag green" style="font-size:0.72rem;"><i class="fas fa-check"></i> Read</span>`}
          <a href="mailto:${escHtml(m.email)}" class="btn btn-ghost btn-sm">
            <i class="fas fa-reply"></i> Reply
          </a>
          <button class="btn btn-danger btn-sm" onclick="deleteMsg(${m.id})">
            <i class="fas fa-trash"></i>
          </button>
        </div>
      </div>
    `).join('');
  }

  function markRead(id) {
    markMessageRead(id);
    renderMessages();
    renderSidebarBadge();
    showToast('Marked as read.', 'success');
  }

  function deleteMsg(id) {
    if (!confirm('Delete this message?')) return;
    deleteMessage(id);
    renderMessages();
    renderSidebarBadge();
    showToast('Message deleted.', 'success');
  }

  function renderSidebarBadge() {
    const badge = document.querySelector('.badge-count');
    const count = getUnreadCount();
    if (badge) {
      if (count > 0) { badge.textContent = count; badge.style.display = 'inline-block'; }
      else badge.style.display = 'none';
    }
  }

  document.getElementById('markAllReadBtn').addEventListener('click', () => {
    const messages = getMessages();
    messages.forEach(m => m.read = true);
    saveMessages(messages);
    renderMessages();
    renderSidebarBadge();
    showToast('All messages marked as read.', 'success');
  });

  document.getElementById('clearAllBtn').addEventListener('click', () => {
    if (!confirm('Delete ALL messages? This cannot be undone.')) return;
    saveMessages([]);
    renderMessages();
    renderSidebarBadge();
    showToast('All messages cleared.', 'success');
  });

  renderMessages();
</script>
</body>
</html>
