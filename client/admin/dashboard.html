<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Dashboard — dev.folio Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="../../assets/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="admin-layout">
  <!-- Sidebar injected by sidebar.js -->

  <main class="main" id="mainContent">
    <div class="page-header">
      <h1 class="page-title">Dashboard Overview</h1>
      <div class="page-actions">
        <a href="../../index.html" target="_blank" class="btn btn-ghost">
          <i class="fas fa-external-link-alt"></i> View Portfolio
        </a>
      </div>
    </div>

    <!-- Stats -->
    <div class="stats-grid" id="statsGrid">
      <div class="stat-card">
        <div class="stat-icon blue"><i class="fas fa-project-diagram"></i></div>
        <div class="stat-body">
          <div class="stat-label">Total Projects</div>
          <div class="stat-value" id="statProjects">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon teal"><i class="fas fa-code"></i></div>
        <div class="stat-body">
          <div class="stat-label">Total Skills</div>
          <div class="stat-value" id="statSkills">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon yellow"><i class="fas fa-envelope"></i></div>
        <div class="stat-body">
          <div class="stat-label">Messages</div>
          <div class="stat-value" id="statMessages">—</div>
        </div>
      </div>
      <div class="stat-card">
        <div class="stat-icon red"><i class="fas fa-bell"></i></div>
        <div class="stat-body">
          <div class="stat-label">Unread</div>
          <div class="stat-value" id="statUnread">—</div>
        </div>
      </div>
    </div>

    <!-- Quick Links -->
    <div class="card">
      <div class="card-header">
        <span class="card-title">Quick Actions</span>
      </div>
      <div class="card-body" style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:1rem;">
        <a href="projects.html" class="btn btn-ghost" style="flex-direction:column;height:80px;gap:0.4rem;">
          <i class="fas fa-plus-circle" style="font-size:1.4rem;color:var(--primary);"></i>
          Manage Projects
        </a>
        <a href="skills.html" class="btn btn-ghost" style="flex-direction:column;height:80px;gap:0.4rem;">
          <i class="fas fa-tools" style="font-size:1.4rem;color:var(--accent);"></i>
          Manage Skills
        </a>
        <a href="messages.html" class="btn btn-ghost" style="flex-direction:column;height:80px;gap:0.4rem;">
          <i class="fas fa-inbox" style="font-size:1.4rem;color:var(--warning);"></i>
          View Messages
        </a>
      </div>
    </div>

    <!-- Recent messages preview -->
    <div class="card" style="margin-top:1.5rem;">
      <div class="card-header">
        <span class="card-title">Recent Messages</span>
        <a href="messages.html" class="btn btn-ghost btn-sm">View All</a>
      </div>
      <div class="card-body" id="recentMessages">
        <div class="empty-state">
          <i class="fas fa-inbox"></i>
          <h3>No messages yet</h3>
          <p>Messages from your contact form will appear here.</p>
        </div>
      </div>
    </div>
  </main>
</div>

<div class="toast-container" id="toastContainer"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script src="js/data.js"></script>
<script src="js/toast.js"></script>
<script src="js/sidebar.js"></script>
<script>
  if (!requireAuth()) throw new Error('Unauthenticated');
  seedDataIfEmpty();
  renderSidebar('dashboard');

  function loadStats() {
    const projects = getProjects();
    const skills   = getSkills();
    const messages = getMessages();
    const unread   = getUnreadCount();

    document.getElementById('statProjects').textContent = projects.length;
    document.getElementById('statSkills').textContent   = skills.length;
    document.getElementById('statMessages').textContent = messages.length;
    document.getElementById('statUnread').textContent   = unread;
  }

  function loadRecentMessages() {
    const messages = getMessages().slice(-3).reverse();
    const el = document.getElementById('recentMessages');
    if (!messages.length) return;

    el.innerHTML = messages.map(m => `
      <div class="message-card ${m.read ? '' : 'unread'}" style="margin-bottom:0.75rem;">
        <div class="message-meta">
          ${!m.read ? '<span class="unread-dot"></span>' : ''}
          <span class="message-name">${escHtml(m.name)}</span>
          <span class="message-email">${escHtml(m.email)}</span>
          ${m.delivery_status === 'success' 
            ? `<span class="tag green" style="font-size:0.65rem; padding:0.1rem 0.4rem; display:inline-flex; align-items:center; gap:2px;"><i class="fas fa-check-circle"></i> Sent</span>` 
            : m.delivery_status === 'failed' 
            ? `<span class="tag red" style="font-size:0.65rem; padding:0.1rem 0.4rem; display:inline-flex; align-items:center; gap:2px;"><i class="fas fa-exclamation-circle"></i> Failed</span>` 
            : m.delivery_status === 'pending'
            ? `<span class="tag yellow" style="font-size:0.65rem; padding:0.1rem 0.4rem; display:inline-flex; align-items:center; gap:2px;"><i class="fas fa-clock"></i> Pending</span>`
            : ''
          }
          <span class="message-time">${new Date(m.timestamp).toLocaleDateString()}</span>
        </div>
        <div class="message-body">${escHtml(m.message.substring(0, 120))}${m.message.length > 120 ? '…' : ''}</div>
      </div>
    `).join('');
  }

  function escHtml(str) {
    const d = document.createElement('div');
    d.textContent = str || '';
    return d.innerHTML;
  }

  loadStats();
  loadRecentMessages();
</script>
</body>
</html>
