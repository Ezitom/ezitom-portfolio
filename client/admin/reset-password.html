<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — dev.folio Admin</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="../../assets/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">dev.folio</div>
    <div class="login-subtitle">Set New Password</div>

    <div id="alert" class="alert"></div>

    <!-- Valid token: show reset form -->
    <div id="formSection" style="display:none;">
      <p style="font-size:0.875rem; color:var(--text-muted); margin-bottom:1.5rem;">
        Choose a strong new password for your admin account.
      </p>
      <form id="resetForm">
        <div class="form-group">
          <label class="form-label" for="newPwd">New Password</label>
          <div style="position:relative;">
            <input type="password" id="newPwd" class="form-control"
              placeholder="Min 8 characters" required minlength="8"
              style="padding-right:2.8rem;" />
            <button type="button" id="toggleNew"
              style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <div class="form-group">
          <label class="form-label" for="confirmPwd">Confirm Password</label>
          <div style="position:relative;">
            <input type="password" id="confirmPwd" class="form-control"
              placeholder="Re-enter new password" required minlength="8"
              style="padding-right:2.8rem;" />
            <button type="button" id="toggleConfirm"
              style="position:absolute;right:0.75rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:1rem;">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>
        <button type="submit" class="btn btn-success" style="width:100%;">
          <i class="fas fa-shield-alt"></i> Save New Password
        </button>
      </form>
    </div>

    <!-- Invalid / expired token -->
    <div id="invalidSection" style="display:none; text-align:center; padding:1rem 0;">
      <div style="font-size:2.5rem; color:var(--danger); margin-bottom:1rem;">
        <i class="fas fa-clock"></i>
      </div>
      <h3 style="color:var(--text); margin-bottom:0.5rem;">Link expired or invalid</h3>
      <p style="font-size:0.875rem; color:var(--text-muted); line-height:1.6;">
        This password reset link has either expired or already been used.
        Reset links are only valid for <strong style="color:var(--warning);">15 minutes</strong>.
      </p>
      <a href="forgot.html" class="btn btn-primary" style="margin-top:1.5rem; width:100%; display:flex;">
        <i class="fas fa-redo"></i> Request a new link
      </a>
    </div>

    <a class="forgot-link" href="login.html">
      <i class="fas fa-arrow-left"></i> Back to Login
    </a>
  </div>
</div>

<script>
  // ── Read token from URL query string ──────────────────────────────────────
  const urlToken  = new URLSearchParams(window.location.search).get('token');
  const storedToken  = localStorage.getItem('pwd_reset_token');
  const storedExpiry = parseInt(localStorage.getItem('pwd_reset_expiry') || '0', 10);

  const alertEl = document.getElementById('alert');

  function showAlert(msg, type = 'error') {
    alertEl.textContent = msg;
    alertEl.className = `alert alert-${type} show`;
    window.scrollTo(0, 0);
  }

  // ── Validate token on page load ───────────────────────────────────────────
  const isValidToken = (
    urlToken &&
    storedToken &&
    urlToken === storedToken &&
    Date.now() < storedExpiry
  );

  if (isValidToken) {
    document.getElementById('formSection').style.display = 'block';
  } else {
    document.getElementById('invalidSection').style.display = 'block';
  }

  // ── Password visibility toggles ───────────────────────────────────────────
  function setupToggle(toggleId, inputId) {
    document.getElementById(toggleId).addEventListener('click', function () {
      const input = document.getElementById(inputId);
      const icon  = this.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    });
  }
  setupToggle('toggleNew',     'newPwd');
  setupToggle('toggleConfirm', 'confirmPwd');

  // ── Reset form submission ─────────────────────────────────────────────────
  document.getElementById('resetForm').addEventListener('submit', function (e) {
    e.preventDefault();

    const newPwd     = document.getElementById('newPwd').value;
    const confirmPwd = document.getElementById('confirmPwd').value;

    if (newPwd !== confirmPwd) {
      showAlert('Passwords do not match. Please try again.');
      return;
    }
    if (newPwd.length < 8) {
      showAlert('Password must be at least 8 characters.');
      return;
    }

    // Save the new password to localStorage, clear the token
    localStorage.setItem('admin_custom_password', newPwd);
    localStorage.removeItem('pwd_reset_token');
    localStorage.removeItem('pwd_reset_expiry');

    // Redirect to login with a success flag
    window.location.href = 'login.html?reset=success';
  });
</script>
</body>
</html>
