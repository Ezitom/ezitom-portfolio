<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — dev.folio</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" type="image/x-icon" href="../../assets/favicon/favicon.ico" />
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css" />
  <link rel="stylesheet" href="css/admin.css" />
</head>
<body>

<div class="login-page">
  <div class="login-card">
    <div class="login-logo">dev.folio</div>
    <div class="login-subtitle">Admin Dashboard</div>

    <div id="alert" class="alert alert-error"></div>

    <form id="loginForm" novalidate>
      <div class="form-group">
        <label class="form-label" for="email">Gmail Address</label>
        <input type="email" id="email" class="form-control" placeholder="admin@gmail.com" required autocomplete="email" />
      </div>
      <div class="form-group">
        <label class="form-label" for="password">Password</label>
        <div style="position:relative;">
          <input type="password" id="password" class="form-control" placeholder="Enter password" required autocomplete="current-password" />
          <button type="button" id="togglePwd" style="position:absolute;right:0.8rem;top:50%;transform:translateY(-50%);background:none;border:none;color:var(--text-muted);cursor:pointer;font-size:0.9rem;">
            <i class="fas fa-eye"></i>
          </button>
        </div>
      </div>
      <label class="checkbox-row">
        <input type="checkbox" id="remember" />
        Remember me for 30 days
      </label>
      <button type="submit" class="btn btn-primary" style="width:100%;" id="loginBtn">
        <i class="fas fa-sign-in-alt"></i> Sign In
      </button>
    </form>

    <a class="forgot-link" href="forgot.html">Forgot password?</a>
  </div>
</div>

<!-- Toast -->
<div class="toast-container" id="toastContainer"></div>

<script src="js/config.js"></script>
<script src="js/auth.js"></script>
<script>
  // Redirect if already logged in
  if (isAuthenticated()) window.location.href = 'dashboard.html';

  // Show success banner if redirected from reset-password.html
  (function checkResetSuccess() {
    const params = new URLSearchParams(window.location.search);
    if (params.get('reset') === 'success') {
      const alertEl = document.getElementById('alert');
      alertEl.textContent = '✓ Password updated successfully! Please sign in with your new password.';
      alertEl.className = 'alert alert-success show';
      // Clean the URL
      history.replaceState({}, '', 'login.html');
    }
  })();

  // Password toggle
  document.getElementById('togglePwd').addEventListener('click', function() {
    const pwd = document.getElementById('password');
    const icon = this.querySelector('i');
    if (pwd.type === 'password') {
      pwd.type = 'text';
      icon.className = 'fas fa-eye-slash';
    } else {
      pwd.type = 'password';
      icon.className = 'fas fa-eye';
    }
  });

  document.getElementById('loginForm').addEventListener('submit', function(e) {
    e.preventDefault();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const remember = document.getElementById('remember').checked;
    const alert    = document.getElementById('alert');
    const btn      = document.getElementById('loginBtn');

    alert.classList.remove('show');

    const activePassword = localStorage.getItem('admin_custom_password') || ADMIN_PASSWORD;
    if (email === ADMIN_EMAIL && password === activePassword) {
      btn.disabled = true;
      btn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> Signing in…';
      localStorage.setItem('admin_logged_in', 'true');
      if (remember) localStorage.setItem('admin_remember', 'true');
      setTimeout(() => window.location.href = 'dashboard.html', 600);
    } else {
      alert.textContent = 'Invalid email or password. Please try again.';
      alert.classList.add('show');
      document.getElementById('password').value = '';
      document.getElementById('password').focus();
    }
  });
</script>
</body>
</html>
